<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>KeyGen<span class="pro">Pro</span></h2>
        <p class="description">Generate New Password</p>
        <div class="input-section">
            <div class="input-box">
                <label for="length">Number of Characters:</label>
                <input type="number" id="length" min="1" max="30" value="5">
            </div>
        </div>
        <button class="generate-btn" onclick="generatePassword()">Generate Password</button>
        <div class="result-section">
            <input type="text" id="password" onclick="copyPassword()" placeholder="Password Output " readonly>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
