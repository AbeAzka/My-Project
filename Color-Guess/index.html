<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Guess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="display-container">
        <div class="header flex-space">
            <h2>Guess The Color</h2>
            <div class="timer">
                Timer: <span id="time"></span>
            </div>
            
        </div>

        <div class="question-area">
            <p class="question-text">Pilih warna yang sesuai dengan kode berikut:</p>
            <h1 id="rgb-value">RGB(255,0,0)</h1>
        </div>

        <div id="container" class="button-container"></div>


        <div class="footer flex-space">
            <div class="number-of-count">
                Question: <span id="question-number">0</span>/10
            </div>

            <button id="next-button">Next</button>
        </div>

        <div class="start-screen">
            <h1>Guess The Color</h1>
            <button id="start-button">Start Game</button>
        </div>

        <div class="score-container hide">
                <h1></h1>
                <div id="user-score"></div>
                <button id="restart">Restart Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
