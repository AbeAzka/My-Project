<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hitung Nilai Siswa</h1>
        <div class="input-group">
            <label>Nilai Tugas(10%): </label>
            <input type="number" id="tugas" min="0" max="100" placeholder="0-100">
        </div>
        <div class="input-group">
            <label>Nilai Quiz(15%): </label>
            <input type="number" id="quiz" min="0" max="100" placeholder="0-100">
        </div>
        <div class="input-group">
            <label>Nilai UTS(30%): </label>
            <input type="number" id="uts" min="0" max="100" placeholder="0-100">
        </div>
        <div class="input-group">
            <label>Nilai UAS(35%): </label>
            <input type="number" id="uas" min="0" max="100" placeholder="0-100">
        </div>
        <div class="input-group">
            <label>Nilai Absensi(10%): </label>
            <input type="number" id="absensi" min="0" max="100" placeholder="0-100">
        </div>
        <button onclick="hitungNilai()">Hitung Nilai</button>
    </div>    
    <br>
        <div class="resultArea" id="resultArea" style="    display:none;">
            <table>
                <tr>
                    <th>Nilai Akhir</th>
                    <th>Keterangan</th>
                </tr>
                <tr>
                    <td id="displayNilai">-</td>
                    <td id="displayStatus">-</td>
                </tr>
            </table>
        </div>
    
    <script src="script.js"></script>
</body>
</html>
